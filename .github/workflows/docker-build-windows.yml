name: Windows Docker Build Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker is available
        run: |
          docker version
          docker info

      - name: Build Docker image
        run: docker build -t pancake-mcp-server:test .

      - name: Verify image was created
        run: docker images pancake-mcp-server:test

      - name: Smoke test - health endpoint
        run: |
          docker run -d --name pancake-test -p 8000:8000 -e PANCAKE_API_KEY=test-key pancake-mcp-server:test
          Start-Sleep -Seconds 5
          $response = Invoke-WebRequest -Uri http://localhost:8000/health -UseBasicParsing
          Write-Host "Health check response: $($response.Content)"
          if ($response.StatusCode -ne 200) { exit 1 }
          docker stop pancake-test
