version: '3.8'

services:
  pancake-mcp:
    build: .
    ports:
      - "${MCP_PORT:-8000}:8000"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=${MCP_PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PANCAKE_API_BASE_URL=${PANCAKE_API_BASE_URL:-https://pos.pages.fm/api/v1}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mcp-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.1'

  # Optional: Reverse proxy for SSL termination
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      - pancake-mcp
    restart: unless-stopped
    networks:
      - mcp-network
    profiles: ["with-nginx"]

networks:
  mcp-network:
    driver: bridge